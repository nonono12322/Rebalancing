<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ETF 계산기">
<title>ETF 리밸런싱 계산기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --text: #000000;
    --text2: #6c6c70;
    --text3: #aeaeb2;
    --border: rgba(0,0,0,0.1);
    --blue: #007aff;
    --blue-bg: #e8f1ff;
    --blue-text: #0040cc;
    --purple: #5856d6;
    --purple-bg: #eeeefd;
    --purple-text: #2c2b8a;
    --green: #34c759;
    --green-bg: #e5f8eb;
    --green-text: #1a6b30;
    --red: #ff3b30;
    --red-bg: #fff0ef;
    --red-text: #cc1a12;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --card: #2c2c2e;
      --text: #ffffff;
      --text2: #aeaeb2;
      --text3: #636366;
      --border: rgba(255,255,255,0.1);
      --blue-bg: #001f5c;
      --blue-text: #6aabff;
      --purple-bg: #1a1a60;
      --purple-text: #b0afff;
      --green-bg: #0d3b1a;
      --green-text: #5dde7c;
      --red-bg: #3b0d0a;
      --red-text: #ff7b74;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .header {
    background: var(--card);
    border-bottom: 0.5px solid var(--border);
    padding: 16px 20px 12px;
    padding-top: calc(env(safe-area-inset-top) + 16px);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header h1 {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
  }

  .save-status {
    font-size: 12px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .save-status.saved { color: var(--green); }

  .content { padding: 16px; }

  .section { margin-bottom: 20px; }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
    padding-left: 4px;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .card-row {
    padding: 13px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 0.5px solid var(--border);
  }

  .card-row:last-child { border-bottom: none; }

  .row-label {
    font-size: 15px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }

  .tag {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 6px;
  }

  .tag-qqq { background: var(--blue-bg); color: var(--blue-text); }
  .tag-tqqq { background: var(--purple-bg); color: var(--purple-text); }
  .tag-schd { background: var(--green-bg); color: var(--green-text); }

  .frac { font-size: 10px; color: var(--blue); font-weight: 500; }

  input[type=number] {
    background: transparent;
    border: none;
    outline: none;
    font-size: 15px;
    color: var(--blue);
    text-align: right;
    width: 130px;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    -webkit-appearance: none;
  }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

  .input-unit {
    font-size: 14px;
    color: var(--text2);
    margin-left: 4px;
    white-space: nowrap;
  }

  .input-wrap {
    display: flex;
    align-items: center;
  }

  /* 비율 현황 */
  .ratio-item {
    padding: 13px 16px;
    border-bottom: 0.5px solid var(--border);
  }

  .ratio-item:last-child { border-bottom: none; }

  .ratio-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .ratio-left { display: flex; align-items: center; gap: 8px; }

  .ratio-pct {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
  }

  .ratio-diff {
    font-size: 13px;
    color: var(--text2);
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 6px;
  }

  .badge-ok { background: var(--green-bg); color: var(--green-text); }
  .badge-warn { background: var(--red-bg); color: var(--red-text); }

  .bar-track {
    height: 6px;
    background: var(--bg);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .bar-qqq { background: var(--blue); }
  .bar-tqqq { background: var(--purple); }
  .bar-schd { background: var(--green); }

  .ratio-sub {
    font-size: 12px;
    color: var(--text3);
  }

  /* 리밸런싱 결과 */
  .alert-card {
    background: var(--red-bg);
    border-radius: var(--radius);
    padding: 13px 16px;
    margin-bottom: 12px;
    display: none;
    font-size: 14px;
    color: var(--red-text);
    font-weight: 500;
  }

  .result-item {
    padding: 13px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 0.5px solid var(--border);
  }

  .result-item:last-child { border-bottom: none; }

  .result-left { display: flex; flex-direction: column; gap: 3px; }

  .result-name { font-size: 15px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 6px; }

  .result-sub { font-size: 13px; color: var(--text2); }

  .result-amount { font-size: 16px; font-weight: 600; color: var(--blue); }
  .result-pass { font-size: 14px; color: var(--text3); }

  .remain-row {
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text2);
    background: var(--card);
    border-radius: var(--radius);
    margin-top: 8px;
    text-align: center;
  }

  .total-row {
    padding: 13px 16px;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: var(--text2);
    background: var(--card);
    border-radius: var(--radius);
    margin-top: 8px;
  }

  .total-val { font-weight: 600; color: var(--text); }

  .footer {
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    padding: 20px 16px 32px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <h1>ETF 리밸런싱 계산기</h1>
    <div class="save-status" id="save-status">불러오는 중...</div>
  </div>
</div>

<div class="content">

  <!-- 주가 입력 -->
  <div class="section">
    <div class="section-title">현재 주가 (USD)</div>
    <div class="card">
      <div class="card-row">
        <div class="row-label"><span class="tag tag-qqq">QQQ</span> <span class="frac">소수점 가능</span></div>
        <div class="input-wrap">
          <input type="number" id="price-qqq" value="480" min="0" step="0.01" inputmode="decimal" oninput="onChange()">
          <span class="input-unit">$</span>
        </div>
      </div>
      <div class="card-row">
        <div class="row-label"><span class="tag tag-tqqq">TQQQ</span></div>
        <div class="input-wrap">
          <input type="number" id="price-tqqq" value="60" min="0" step="0.01" inputmode="decimal" oninput="onChange()">
          <span class="input-unit">$</span>
        </div>
      </div>
      <div class="card-row">
        <div class="row-label"><span class="tag tag-schd">SCHD</span></div>
        <div class="input-wrap">
          <input type="number" id="price-schd" value="29" min="0" step="0.01" inputmode="decimal" oninput="onChange()">
          <span class="input-unit">$</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 보유 주수 -->
  <div class="section">
    <div class="section-title">보유 주수</div>
    <div class="card">
      <div class="card-row">
        <div class="row-label"><span class="tag tag-qqq">QQQ</span> <span class="frac">소수점 가능</span></div>
        <div class="input-wrap">
          <input type="number" id="shares-qqq" value="0" min="0" step="0.01" inputmode="decimal" oninput="onChange()">
          <span class="input-unit">주</span>
        </div>
      </div>
      <div class="card-row">
        <div class="row-label"><span class="tag tag-tqqq">TQQQ</span></div>
        <div class="input-wrap">
          <input type="number" id="shares-tqqq" value="0" min="0" step="1" inputmode="numeric" oninput="onChange()">
          <span class="input-unit">주</span>
        </div>
      </div>
      <div class="card-row">
        <div class="row-label"><span class="tag tag-schd">SCHD</span></div>
        <div class="input-wrap">
          <input type="number" id="shares-schd" value="0" min="0" step="1" inputmode="numeric" oninput="onChange()">
          <span class="input-unit">주</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 환율 & 적립금 -->
  <div class="section">
    <div class="section-title">적립 설정</div>
    <div class="card">
      <div class="card-row">
        <div class="row-label">USD/KRW 환율</div>
        <div class="input-wrap">
          <input type="number" id="usdkrw" value="1380" min="1" step="1" inputmode="numeric" oninput="onChange()">
          <span class="input-unit">원</span>
        </div>
      </div>
      <div class="card-row">
        <div class="row-label">이번 달 적립금</div>
        <div class="input-wrap">
          <input type="number" id="invest-krw" value="1000000" min="0" step="10000" inputmode="numeric" oninput="onChange()">
          <span class="input-unit">원</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 현재 비율 -->
  <div class="section">
    <div class="section-title">현재 비율 현황</div>
    <div class="card" id="ratio-display"></div>
  </div>

  <!-- 리밸런싱 결과 -->
  <div class="section">
    <div class="section-title">매수 액션</div>
    <div class="alert-card" id="banding-alert"></div>
    <div class="card" id="action-display"></div>
    <div class="remain-row" id="remain-display"></div>
    <div class="total-row" id="total-display"></div>
  </div>

  <div class="footer">목표 비율 QQQ 40% · TQQQ 30% · SCHD 30%<br>밴딩 ±10% 이탈 시 리밸런싱 권고</div>

</div>

<script>
const TARGETS = { qqq: 0.40, tqqq: 0.30, schd: 0.30 };
const BAND = 0.10;
const FRACTIONAL = { qqq: true, tqqq: false, schd: false };
const STORAGE_KEY = 'etf-rebalancer-v1';

let saveTimer = null;

function setStatus(type, msg) {
  const el = document.getElementById('save-status');
  el.className = 'save-status' + (type ? ' ' + type : '');
  el.textContent = msg;
}

function getValues() {
  return {
    priceQqq: document.getElementById('price-qqq').value,
    priceTqqq: document.getElementById('price-tqqq').value,
    priceSchd: document.getElementById('price-schd').value,
    sharesQqq: document.getElementById('shares-qqq').value,
    sharesTqqq: document.getElementById('shares-tqqq').value,
    sharesSchd: document.getElementById('shares-schd').value,
    usdkrw: document.getElementById('usdkrw').value,
    investKrw: document.getElementById('invest-krw').value,
    savedAt: new Date().toISOString()
  };
}

function applyValues(d) {
  if (!d) return;
  const map = {
    priceQqq: 'price-qqq', priceTqqq: 'price-tqqq', priceSchd: 'price-schd',
    sharesQqq: 'shares-qqq', sharesTqqq: 'shares-tqqq', sharesSchd: 'shares-schd',
    usdkrw: 'usdkrw', investKrw: 'invest-krw'
  };
  for (const [k, id] of Object.entries(map)) {
    if (d[k] !== undefined) document.getElementById(id).value = d[k];
  }
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      applyValues(d);
      if (d.savedAt) {
        const dt = new Date(d.savedAt);
        const str = dt.toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric' })
          + ' ' + dt.toLocaleTimeString('ko-KR', { hour: 'numeric', minute: '2-digit' });
        setStatus('saved', str + ' 저장됨');
      } else {
        setStatus('saved', '저장된 데이터');
      }
    } else {
      setStatus('', '자동 저장');
    }
  } catch(e) {
    setStatus('', '새로 시작');
  }
  recalc();
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(getValues()));
    const dt = new Date();
    const str = dt.toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric' })
      + ' ' + dt.toLocaleTimeString('ko-KR', { hour: 'numeric', minute: '2-digit' });
    setStatus('saved', str + ' 저장됨');
  } catch(e) {
    setStatus('', '저장 실패');
  }
}

function onChange() {
  recalc();
  clearTimeout(saveTimer);
  setStatus('', '저장 중...');
  saveTimer = setTimeout(saveData, 800);
}

function recalc() {
  const usd = parseFloat(document.getElementById('usdkrw').value) || 1380;
  const investKrw = parseFloat(document.getElementById('invest-krw').value) || 0;
  const investUsd = investKrw / usd;

  const prices = {
    qqq: parseFloat(document.getElementById('price-qqq').value) || 0,
    tqqq: parseFloat(document.getElementById('price-tqqq').value) || 0,
    schd: parseFloat(document.getElementById('price-schd').value) || 0
  };
  const shares = {
    qqq: parseFloat(document.getElementById('shares-qqq').value) || 0,
    tqqq: parseFloat(document.getElementById('shares-tqqq').value) || 0,
    schd: parseFloat(document.getElementById('shares-schd').value) || 0
  };

  const vals = {
    qqq: prices.qqq * shares.qqq,
    tqqq: prices.tqqq * shares.tqqq,
    schd: prices.schd * shares.schd
  };
  const totalUsd = vals.qqq + vals.tqqq + vals.schd;
  const totalKrw = totalUsd * usd;

  const ratios = totalUsd > 0
    ? { qqq: vals.qqq/totalUsd, tqqq: vals.tqqq/totalUsd, schd: vals.schd/totalUsd }
    : { qqq: 0, tqqq: 0, schd: 0 };

  const diffs = {
    qqq: ratios.qqq - TARGETS.qqq,
    tqqq: ratios.tqqq - TARGETS.tqqq,
    schd: ratios.schd - TARGETS.schd
  };

  const needsRebalance = totalUsd > 0 && Object.values(diffs).some(d => Math.abs(d) > BAND);

  const etfNames = { qqq: 'QQQ', tqqq: 'TQQQ', schd: 'SCHD' };
  const tagClass = { qqq: 'tag-qqq', tqqq: 'tag-tqqq', schd: 'tag-schd' };
  const barClass = { qqq: 'bar-qqq', tqqq: 'bar-tqqq', schd: 'bar-schd' };

  // 비율 현황
  let ratioHtml = '';
  for (const k of ['qqq','tqqq','schd']) {
    const pct = (ratios[k]*100).toFixed(1);
    const diff = diffs[k]*100;
    const isOk = totalUsd === 0 || Math.abs(diff) <= BAND*100;
    const diffStr = diff >= 0 ? `+${diff.toFixed(1)}%` : `${diff.toFixed(1)}%`;
    const valKrw = Math.round(vals[k]*usd).toLocaleString('ko-KR');
    ratioHtml += `
    <div class="ratio-item">
      <div class="ratio-top">
        <div class="ratio-left">
          <span class="tag ${tagClass[k]}">${etfNames[k]}</span>
          <span class="ratio-pct">${pct}%</span>
          <span class="ratio-diff">${diffStr}</span>
        </div>
        <span class="badge ${isOk?'badge-ok':'badge-warn'}">${isOk?'정상':'이탈'}</span>
      </div>
      <div class="bar-track"><div class="bar-fill ${barClass[k]}" style="width:${Math.min(pct,100)}%"></div></div>
      <div class="ratio-sub">목표 ${(TARGETS[k]*100).toFixed(0)}% · ₩${valKrw}</div>
    </div>`;
  }
  document.getElementById('ratio-display').innerHTML = ratioHtml;

  // 밴딩 경고
  const alertEl = document.getElementById('banding-alert');
  if (needsRebalance) {
    alertEl.style.display = 'block';
    const outliers = Object.entries(diffs).filter(([,d])=>Math.abs(d)>BAND).map(([k])=>etfNames[k]).join(', ');
    alertEl.textContent = `⚠️ 리밸런싱 필요! ${outliers} 비율이 ±10%를 이탈했습니다.`;
  } else {
    alertEl.style.display = 'none';
  }

  // 매수 액션 — 적립금 예산 내에서 목표 비율에 최대한 가깝게 그리디 배분
  // 한 번에 살 수 있는 최소 단위(QQQ는 0.01주, TQQQ/SCHD는 1주)를 반복적으로
  // "지금 사면 목표 비율과의 오차합이 가장 줄어드는" ETF에 배분한다.
  const minUnit = { qqq: 0.01, tqqq: 1, schd: 1 };
  const buyShares = { qqq: 0, tqqq: 0, schd: 0 };
  const curVals = { ...vals };
  let remainingUsd = investUsd;

  function errorScore(v) {
    const t = v.qqq + v.tqqq + v.schd;
    if (t <= 0) return Infinity;
    return Object.keys(TARGETS).reduce((sum, k) => sum + Math.abs(v[k]/t - TARGETS[k]), 0);
  }

  // 너무 많은 반복 방지를 위해 적당한 스텝 크기로 시작해 점점 줄여나감
  let guard = 0;
  while (remainingUsd > 0 && guard < 100000) {
    guard++;
    let bestKey = null;
    let bestScore = Infinity;
    for (const k of ['qqq','tqqq','schd']) {
      const unitCost = minUnit[k] * prices[k];
      if (unitCost <= 0 || unitCost > remainingUsd) continue;
      const trial = { ...curVals, [k]: curVals[k] + unitCost };
      const score = errorScore(trial);
      if (score < bestScore - 1e-12) {
        bestScore = score;
        bestKey = k;
      }
    }
    if (bestKey === null) break; // 더 이상 살 수 있는 ETF 없음
    const unitCost = minUnit[bestKey] * prices[bestKey];
    curVals[bestKey] += unitCost;
    buyShares[bestKey] += minUnit[bestKey];
    remainingUsd -= unitCost;
  }

  let actionHtml = '';
  let usedUsd = 0;
  let anyBuy = false;

  for (const k of ['qqq','tqqq','schd']) {
    const sharesToBuy = FRACTIONAL[k] ? Math.round(buyShares[k] * 100) / 100 : Math.round(buyShares[k]);
    const actualCost = sharesToBuy * prices[k];
    usedUsd += actualCost;
    const costKrw = Math.round(actualCost * usd).toLocaleString('ko-KR');
    if (sharesToBuy > 0) {
      anyBuy = true;
      const shareStr = FRACTIONAL[k] ? sharesToBuy.toFixed(2) + '주' : sharesToBuy + '주';
      actionHtml += `
      <div class="result-item">
        <div class="result-left">
          <div class="result-name"><span class="tag ${tagClass[k]}">${etfNames[k]}</span> ${shareStr} 매수</div>
          <div class="result-sub">$${prices[k].toFixed(2)}/주</div>
        </div>
        <div class="result-amount">₩${costKrw}</div>
      </div>`;
    } else {
      actionHtml += `
      <div class="result-item">
        <div class="result-left">
          <div class="result-name"><span class="tag ${tagClass[k]}">${etfNames[k]}</span></div>
          <div class="result-sub">이번엔 매수 없음</div>
        </div>
        <div class="result-pass">패스</div>
      </div>`;
    }
  }
  if (!anyBuy) {
    actionHtml = `
    <div class="result-item">
      <div class="result-left">
        <div class="result-name">매수할 수 없음</div>
        <div class="result-sub">적립금 또는 주가를 확인하세요</div>
      </div>
      <div class="result-pass">-</div>
    </div>`;
  }
  document.getElementById('action-display').innerHTML = actionHtml;

  const remainKrw = Math.round((investUsd - usedUsd) * usd).toLocaleString('ko-KR');
  document.getElementById('remain-display').textContent = `잔액 ₩${remainKrw} (1주 단위 미달분, 다음 달 이월)`;

  document.getElementById('total-display').innerHTML =
    `<span>총 평가금액</span><span class="total-val">$${Math.round(totalUsd).toLocaleString()} · ₩${Math.round(totalKrw).toLocaleString('ko-KR')}</span>`;
}
